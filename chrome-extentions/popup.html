<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helpy Tab Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
      /* =========================================
         1. DESIGN SYSTEM - HANDMADE AESTHETIC
         ========================================= */
      :root {
        /* Warm, Organic Color Palette */
        --paper-bg: #fef9e7;
        --paper-text: #2d1810;
        --accent-1: #e67e22; /* Warm Orange */
        --accent-2: #c0392b; /* Red-Brown */
        --accent-3: #27ae60; /* Warm Green */
        --ink-dark: #1a1a1a;
        --ink-light: #5d4037;
        --border-ink: #4a3728;
        --line-color: #e0d5c7;
        --shadow-soft: rgba(0, 0, 0, 0.15);

        /* Hand-Drawn Borders */
        --border-thick: 3px solid var(--border-ink);
        --border-thin: 2px solid var(--border-ink);

        /* Fonts */
        --font-hand: 'Caveat', cursive;
        --font-body: 'Patrick Hand', cursive;
      }

      /* =========================================
         2. GLOBAL & LAYOUT - PAPER TEXTURE
         ========================================= */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      * {
        margin: 0;
        padding: 0;
      }
      *::selection {
        background: var(--accent-1);
        color: var(--paper-bg);
      }

      html {
        -webkit-font-smoothing: antialiased;
      }

      body {
        width: 420px;
        padding: 1.5rem;
        font-family: var(--font-body);
        line-height: 1.7;
        color: var(--ink-dark);
        background-color: var(--paper-bg);
        background-image:
          linear-gradient(90deg, var(--line-color) 1px, transparent 1px),
          linear-gradient(var(--line-color) 1px, transparent 1px);
        background-size: 24px 24px;
      }

      h1, h2, h3 {
        font-family: var(--font-hand);
        color: var(--ink-dark);
      }

      h1 {
        text-align: center;
        font-size: 2.5rem;
        transform: rotate(-1deg);
        margin-bottom: 1rem;
      }

      .section {
        margin-bottom: 1.25rem;
        padding: 1rem 1.25rem;
        background-color: #fffdf5;
        border: var(--border-thin);
        border-radius: 2px 12px 6px 10px;
        box-shadow: 4px 4px 0px var(--border-ink);
        transform: rotate(0.3deg);
      }

      .section:nth-child(even) {
        transform: rotate(-0.4deg);
      }

      .section h2, .section h3 {
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
        border-bottom: 2px dashed var(--border-ink);
        display: inline-block;
        padding-bottom: 0.25rem;
      }

      /* Buttons */
      button,
      .btn {
        padding: 0.6rem 1.2rem;
        border: var(--border-thick);
        border-radius: 6px 16px 10px 12px;
        font-family: var(--font-hand);
        font-size: 1.2rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 4px 4px 0 var(--border-ink);
        transform: rotate(-0.5deg);
      }

      button:hover,
      .btn:hover {
        transform: translateY(-2px) rotate(0deg);
        box-shadow: 6px 6px 0 var(--border-ink);
      }

      .btn-primary {
        background-color: var(--accent-1);
        color: var(--paper-bg);
      }

      .btn-secondary {
        background-color: var(--paper-bg);
        color: var(--ink-dark);
      }

      .btn-group {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 0.5rem;
      }

      /* Form Inputs */
      input, textarea, select {
        width: 100%;
        padding: 0.75rem 1rem;
        border: var(--border-thin);
        background-color: var(--paper-bg);
        border-radius: 6px 2px 10px 4px;
        font-family: var(--font-body);
        font-size: 1rem;
        color: var(--ink-dark);
        box-shadow: 3px 3px 0 var(--border-ink);
        transition: all 0.2s ease;
        margin-bottom: 0.5rem;
      }

      input:focus, textarea:focus, select:focus {
        outline: none;
        box-shadow: 5px 5px 0 var(--border-ink);
        background-color: #fff7e6;
      }

      /* Checkbox */
      input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 24px;
        height: 24px;
        border: var(--border-thin);
        border-radius: 4px 8px 6px 10px;
        cursor: pointer;
        background: var(--paper-bg);
        box-shadow: 2px 2px 0 var(--border-ink);
        position: relative;
      }

      input[type="checkbox"]:checked {
        background-color: var(--accent-3);
      }

      input[type="checkbox"]:checked::after {
        content: '✓';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 1.5rem;
        font-family: var(--font-hand);
      }

      /* Pomodoro Timer */
      .pomodoro-timer {
        text-align: center;
        margin-bottom: 0.75rem;
      }
      .pomodoro-time {
        font-size: 2.5rem;
        font-family: var(--font-hand);
        font-weight: 700;
        padding: 0.5rem;
      }
      .pomodoro-label {
        font-family: var(--font-hand);
        font-size: 1.3rem;
        margin-bottom: 0.25rem;
      }

      /* Tabs List */
      .tabs-list {
        max-height: 220px;
        overflow-y: auto;
      }
      .tab-item {
        padding: 0.75rem;
        border: var(--border-thin);
        border-radius: 4px 12px 8px 10px;
        margin-bottom: 0.75rem;
        background-color: #fffdf5;
        box-shadow: 3px 3px 0 var(--border-ink);
        transform: rotate(-0.3deg);
      }
      .tab-item.inactive {
        background-color: #fff5f5;
        border-color: var(--accent-2);
      }
      .tab-item.active-tab {
        background-color: #f0fff4;
        border-color: var(--accent-3);
      }
      .tab-title {
        font-family: var(--font-hand);
        font-size: 1.2rem;
        font-weight: 600;
      }
      .tab-url {
        font-size: 0.875rem;
        color: var(--ink-light);
      }
      .tab-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 0.25rem;
        font-size: 0.875rem;
        color: var(--ink-light);
      }
      .tab-status.inactive {
        color: var(--accent-2);
        font-weight: 600;
      }

      /* Connection Status */
      .connection-status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 0.75rem;
        border: var(--border-thin);
        border-radius: 6px 14px 10px 8px;
        font-family: var(--font-hand);
        font-size: 1.1rem;
        font-weight: 700;
      }
      .status-connected {
        background-color: #dcfce7;
        color: #166534;
      }
      .status-disconnected {
        background-color: #fee2e2;
        color: #991b1b;
      }
      .status-paused {
        background-color: #fef3c7;
        color: #92400e;
      }

      .status-message {
        margin-top: 0.5rem;
        font-size: 0.95rem;
        color: var(--ink-light);
      }

      /* Focus Task Banner */
      .focus-task-banner {
        display: none;
        padding: 0.75rem 1rem;
        border: var(--border-thick);
        border-radius: 6px 16px 10px 12px;
        background-color: var(--accent-1);
        color: var(--paper-bg);
        font-family: var(--font-hand);
        font-size: 1.2rem;
        font-weight: 700;
        box-shadow: 4px 4px 0 var(--border-ink);
        margin-bottom: 1.25rem;
      }

      /* Empty State */
      .empty-state {
        padding: 1rem;
        font-size: 0.95rem;
        color: var(--ink-light);
        text-align: center;
      }

      /* Action Links */
      .action-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
        margin-top: 1rem;
      }
      .action-link {
        font-family: var(--font-hand);
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--ink-dark);
        text-decoration: none;
        padding: 0.3rem 0.75rem;
        border: var(--border-thin);
        border-radius: 4px 8px 6px 10px;
        background: var(--paper-bg);
        box-shadow: 2px 2px 0 var(--border-ink);
        transition: all 0.2s ease;
      }
      .action-link:hover {
        transform: translateY(-1px);
        box-shadow: 3px 3px 0 var(--border-ink);
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      .eyebrow {
        font-family: var(--font-hand);
        font-size: 1.1rem;
        color: var(--accent-1);
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        font-size: 0.95rem;
        color: var(--ink-light);
      }
      .dark-mode-btn {
        background: var(--paper-bg);
        border: var(--border-thin);
        border-radius: 50%;
        width: 36px;
        height: 36px;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 2px 2px 0 var(--border-ink);
      }

      /* Task Item */
      .popup-task-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.6rem 0.75rem;
        border: var(--border-thin);
        border-radius: 4px 12px 8px 10px;
        background-color: #fffdf5;
        margin-bottom: 0.5rem;
        box-shadow: 3px 3px 0 var(--border-ink);
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .popup-task-item:hover {
        transform: translateY(-1px);
        box-shadow: 4px 4px 0 var(--border-ink);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--paper-bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-ink);
        border-radius: 4px;
      }

      /* Spinner animation */
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="popupAnnouncements" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <div>
      <div class="header">
        <div class="brand-block">
          <div class="eyebrow">Tab Tracker</div>
          <h1>Helpy</h1>
          <p class="subtitle" id="subtitle">Keeping an eye on your Chrome tabs.</p>
        </div>
        <button id="darkModeBtn" class="dark-mode-btn" aria-label="Toggle dark mode">🌙</button>
      </div>

      <!-- Active focus task banner -->
      <div class="focus-task-banner" id="focusTaskBanner"></div>

      <!-- Google Auth Section -->
      <div class="section" id="googleAuthSection">
        <h3>Google Account</h3>
        <div id="googleAuthContent"></div>
      </div>

      <div class="section">
        <div id="connectionStatus" class="connection-status status-disconnected">
          ✗ App unavailable
        </div>
        <p id="statusMessage" class="status-message" role="status" aria-live="polite">
          Waiting for connection.
        </p>
        <div class="btn-group">
          <button id="toggleBtn" class="btn btn-primary">Pause Tracking</button>
        </div>
      </div>

      <!-- Pomodoro Timer Section -->
      <div class="section">
        <h3>Pomodoro Timer</h3>
        <div class="pomodoro-timer">
          <div class="pomodoro-label" id="pomodoroLabel">Focus Time</div>
          <div class="pomodoro-time" id="pomodoroTime">25:00</div>
        </div>
        <div class="btn-group">
          <button id="pomodoroStart" class="btn btn-primary">Start</button>
          <button id="pomodoroPause" class="btn btn-secondary" style="display: none">Pause</button>
          <button id="pomodoroBreak" class="btn btn-secondary">Break</button>
          <button id="pomodoroStop" class="btn btn-secondary" style="display: none">Stop</button>
        </div>
      </div>

      <!-- Focus Plan Section (ADHD-Friendly) -->
      <div class="section" id="planSection">
        <h3>Create Focus Plan</h3>
        <form id="popupPlanForm">
          <input type="text" id="popupPlanTitle" placeholder="Plan title..." required />
          <input type="number" id="popupPlanDuration" min="5" max="240" value="30" placeholder="Duration (minutes)" required />
          <select id="popupChunkSize">
            <option value="5">5-minute chunks</option>
            <option value="10">10-minute chunks</option>
            <option value="15" selected>15-minute chunks</option>
            <option value="20">20-minute chunks</option>
            <option value="30">30-minute chunks</option>
          </select>
          <button type="submit" class="btn btn-primary">Create Plan</button>
        </form>

        <!-- Current Plan Display -->
        <div id="currentPopupPlan" style="display: none; margin-top: 1rem; padding-top: 1rem; border-top: 2px dashed var(--border-ink);">
          <h4 style="font-family: var(--font-hand); font-size: 1.25rem; margin-bottom: 0.5rem;">Current Plan</h4>
          <div id="currentPopupPlanContent"></div>
          <div class="btn-group" style="margin-top: 0.5rem;">
            <button id="startPopupPlanBtn" class="btn btn-primary">Start Timer</button>
            <button id="clearPopupPlanBtn" class="btn btn-secondary">Clear</button>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>Tracked Tabs</h3>
        <div id="tabsList" class="tabs-list" role="list"></div>
      </div>

      <div class="action-links">
        <a href="#" id="exportBtn" class="action-link">📥 Export Data</a>
        <a href="#" id="importBtn" class="action-link">📤 Import Data</a>
        <a href="#" id="reportsLink" class="action-link">📊 View Reports</a>
        <a href="#" id="settingsLink" class="action-link">⚙ Open Settings</a>
      </div>

      <input type="file" id="importFile" accept=".json" style="display: none" />
    </div>

    <script src="popup.js"></script>
  </body>
</html>
